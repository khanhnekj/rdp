name: RDP-FINAL

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Create User
        run: |
          $password = "123456Aa@"
          net user RDP $password /add
          net localgroup administrators RDP /add
          net localgroup "Remote Desktop Users" RDP /add
          echo "PASS=$password" >> $env:GITHUB_ENV

      - name: Install Tailscale
        run: |
          Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe -OutFile ts.exe
          Start-Process ts.exe -ArgumentList "/silent" -Wait

      - name: Connect Tailscale
        run: |
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Get Tailscale IP
        run: |
          $ip = $null
          for ($i=0; $i -lt 20; $i++) {
            $ip = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
            if ($ip) { break }
            Start-Sleep -Seconds 5
          }

          if (-not $ip) {
            Write-Error "Failed to get Tailscale IP"
            exit 1
          }

          echo "IP=$ip" >> $env:GITHUB_ENV

      - name: Show RDP Info
        run: |
          Write-Host ""
          Write-Host "====== RDP ACCESS ======"
          Write-Host "IP: $env:IP"
          Write-Host "User: RDP"
          Write-Host "Pass: $env:PASS"
          Write-Host "========================"
          Write-Host ""

      - name: Keep Alive
        run: |
          while ($true) {
            Write-Host "RDP is running..."
            Start-Sleep -Seconds 300
          }
